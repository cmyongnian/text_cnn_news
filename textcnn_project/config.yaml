seed: 42

max_len: 80
max_keyword_len: 16
vocab_size: 20000
min_freq: 2
num_classes: 15

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  output_dir: outputs

model:
  embed_dim: 200
  num_filters: 128
  kernel_sizes: [2, 3, 4, 5]
  dropout: 0.5
  emb_dropout: 0.1
  fusion_hidden_dim: 128

train:
  batch_size: 64
  lr: 0.001
  epochs: 20
  patience: 5
  val_ratio: 0.1
  weight_decay: 0.0001
  grad_clip: 1.0
  lr_factor: 0.5
  lr_patience: 1